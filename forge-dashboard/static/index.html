<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forge Dashboard</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --dim: #8b949e;
  --green: #3fb950;
  --red: #f85149;
  --yellow: #d29922;
  --blue: #58a6ff;
  --purple: #bc8cff;
  --orange: #d18616;
  --cyan: #39d2c0;
  --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--mono); font-size: 13px; background: var(--bg); color: var(--text); }
a { color: var(--blue); text-decoration: none; cursor: pointer; }
a:hover { text-decoration: underline; }

.header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px;
}
.header h1 { font-size: 16px; font-weight: 600; }
.header .status { margin-left: auto; color: var(--dim); font-size: 12px; }

.content { padding: 24px; max-width: 1400px; margin: 0 auto; }

/* Run list */
.run-list { margin-top: 16px; }
.run-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 16px;
  margin-bottom: 6px;
  display: grid;
  grid-template-columns: 90px 80px 1fr 100px 80px 60px;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  font-size: 12px;
}
.run-row:hover { border-color: var(--blue); }
.run-row.active { border-color: var(--blue); border-width: 2px; }

.run-id { color: var(--dim); font-size: 11px; }
.run-status { font-weight: 600; }
.run-status.success { color: var(--green); }
.run-status.failed { color: var(--red); }
.run-status.running { color: var(--blue); }
.run-status.pending { color: var(--yellow); }
.run-error { color: var(--red); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.run-time { color: var(--dim); font-size: 11px; text-align: right; }
.run-duration { color: var(--dim); text-align: right; }
.run-cost { color: var(--dim); text-align: right; }

/* Project card */
.project-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 16px;
}
.project-header { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }
.project-name { font-size: 16px; font-weight: 600; }
.project-desc { color: var(--dim); font-size: 12px; }
.project-stats { display: flex; gap: 24px; margin-top: 12px; }
.stat { text-align: center; }
.stat-value { font-size: 20px; font-weight: 700; }
.stat-label { color: var(--dim); font-size: 10px; text-transform: uppercase; }

.back-link { margin-bottom: 16px; display: inline-block; font-size: 12px; }

/* Stream viewer */
.stream-viewer {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  max-height: 70vh;
  overflow-y: auto;
  font-size: 12px;
}

.ev { padding: 4px 12px; border-bottom: 1px solid #1c2128; display: flex; gap: 8px; line-height: 1.5; }
.ev:hover { background: #1c2128; }
.ev-seq { color: var(--dim); min-width: 40px; text-align: right; font-size: 10px; flex-shrink: 0; }
.ev-ts { color: var(--dim); min-width: 75px; font-size: 10px; flex-shrink: 0; }
.ev-type { min-width: 70px; font-weight: 600; font-size: 11px; flex-shrink: 0; }
.ev-body { flex: 1; overflow-wrap: break-word; min-width: 0; }

/* Event type colors */
.ev-type.agent { color: var(--blue); }
.ev-type.system { color: var(--purple); }
.ev-type.stdout { color: var(--dim); }
.ev-type.tool_result { color: var(--cyan); }
.ev-type.done { color: var(--green); }
.ev-type.error { color: var(--red); }

/* Tool call styling */
.tool-call { background: #1a2332; border-radius: 3px; padding: 2px 6px; display: inline-block; margin: 1px 0; }
.tool-name { color: var(--yellow); font-weight: 600; }
.tool-input { color: var(--dim); font-size: 11px; }
.tool-input .key { color: var(--purple); }
.tool-input .str { color: var(--green); }
.tool-input .num { color: var(--orange); }

/* Text content */
.agent-text { color: var(--text); white-space: pre-wrap; }

/* Tool result */
.result-content { color: var(--dim); white-space: pre-wrap; font-size: 11px; max-height: 200px; overflow-y: auto; }
.result-content.is-error { color: var(--red); }

/* Progress bar */
.progress-bar { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: var(--dim); }
.progress-bar .tools { color: var(--yellow); }
.progress-bar .tokens { color: var(--purple); }
.progress-bar .dur { color: var(--cyan); }

/* Done event */
.done-box { background: #1a3a1a; border: 1px solid var(--green); border-radius: 4px; padding: 8px 12px; }
.done-box .cost { color: var(--yellow); font-weight: 600; }
.done-box .result-text { color: var(--text); margin-top: 6px; white-space: pre-wrap; }

/* Collapsible */
.collapsible { cursor: pointer; user-select: none; }
.collapsible::before { content: '\25b6 '; font-size: 9px; color: var(--dim); }
.collapsible.open::before { content: '\25bc '; }
.collapse-body { display: none; }
.collapsible.open + .collapse-body { display: block; }

/* Filter bar */
.filter-bar { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
.filter-bar label { color: var(--dim); font-size: 11px; }
.filter-bar input[type="checkbox"] { margin-right: 2px; }
.filter-bar .event-count { margin-left: auto; color: var(--dim); font-size: 11px; }

/* Responsive */
@media (max-width: 900px) {
  .run-row { grid-template-columns: 80px 70px 1fr 80px; }
  .run-cost, .run-time { display: none; }
}
</style>
</head>
<body>

<div class="header">
  <h1>Forge</h1>
  <div class="status" id="header-status"></div>
</div>

<div class="content" id="content">
  <div style="color:var(--dim)">Loading...</div>
</div>

<script>
let currentView = 'overview';
let currentTaskId = null;
let currentRunId = null;
let streamAutoScroll = true;
let filterState = { agent: true, system: true, stdout: true, tool_result: true, done: true, error: true };

// ── Utilities ──

function esc(s) {
  if (typeof s !== 'string') s = String(s ?? '');
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDuration(s) {
  if (s == null) return '--';
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s/60) + 'm ' + (s%60) + 's';
  return Math.floor(s/3600) + 'h ' + Math.floor((s%3600)/60) + 'm';
}

function fmtTime(iso) {
  if (!iso) return '--';
  try {
    const d = new Date(iso);
    return d.toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
  } catch { return iso; }
}

function fmtTimeShort(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit', second:'2-digit' }); }
  catch { return ''; }
}

function fmtCost(c) {
  if (c == null) return '--';
  return '$' + Number(c).toFixed(2);
}

function fmtTokens(n) {
  if (!n) return '0';
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(0) + 'k';
  return String(n);
}

// ── Navigation ──

function showOverview() { currentView = 'overview'; currentTaskId = null; currentRunId = null; refresh(); }
function showTask(taskId) { currentView = 'task'; currentTaskId = taskId; currentRunId = null; refresh(); }
function showRun(taskId, runId) { currentView = 'run'; currentTaskId = taskId; currentRunId = runId; refresh(); }

// ── Overview ──

function renderProjectCard(p, isChild) {
  const statusColor = p.status === 'running' ? 'var(--blue)' :
                      p.status === 'success' || p.status === 'completed' ? 'var(--green)' :
                      p.status === 'failed' ? 'var(--red)' : 'var(--dim)';
  const typeLabel = p.type === 'daemon' ? ' daemon' : p.type === 'script' ? ' script' : '';
  const indent = isChild ? 'margin-left:24px;border-left:3px solid var(--border);' : '';
  return `<div class="project-card" onclick="showTask('${esc(p.id)}')" style="cursor:pointer;${indent}">
    <div class="project-header">
      <span class="project-name" style="${isChild ? 'font-size:14px' : ''}">${isChild ? '└ ' : ''}${esc(p.name)}</span>
      <span style="color:${statusColor};font-weight:600;font-size:11px">${esc(p.status).toUpperCase()}${typeLabel ? `<span style="color:var(--dim);font-weight:400"> ${typeLabel}</span>` : ''}</span>
    </div>
    <div class="project-desc">${esc(p.description)}</div>
    ${p.repo ? `<div style="color:var(--dim);font-size:11px;margin-top:4px">${esc(p.repo)} @ ${esc(p.branch || 'main')}</div>` : ''}
    <div class="project-stats">
      <div class="stat"><div class="stat-value">${p.total_runs}</div><div class="stat-label">Runs</div></div>
      <div class="stat"><div class="stat-value" style="color:var(--green)">${p.counts.success}</div><div class="stat-label">Pass</div></div>
      <div class="stat"><div class="stat-value" style="color:var(--red)">${p.counts.failed}</div><div class="stat-label">Fail</div></div>
      <div class="stat"><div class="stat-value" style="color:var(--blue)">${p.counts.running}</div><div class="stat-label">Active</div></div>
    </div>
    ${p.active_run ? `<div style="margin-top:12px;font-size:11px;color:var(--blue)">Running: ${esc(p.active_run.id.substring(0,12))} (${fmtDuration(p.active_run.duration_s)})</div>` : ''}
  </div>`;
}

function renderOverview(data) {
  const el = document.getElementById('content');
  if (!data.projects || !data.projects.length) {
    el.innerHTML = '<div style="color:var(--dim)">No forge tasks found</div>';
    return;
  }

  let html = '';
  for (const p of data.projects) {
    html += renderProjectCard(p, false);
    // Render children nested under parent
    if (p.children && p.children.length) {
      for (const child of p.children) {
        html += renderProjectCard(child, true);
      }
    }
  }
  el.innerHTML = html;
}

// ── Task detail (run list) ──

function renderTask(runs) {
  const el = document.getElementById('content');
  let html = `<a class="back-link" onclick="showOverview()">&larr; All projects</a>
    <h2 style="margin-bottom:16px">${esc(currentTaskId)}</h2>
    <div class="run-list">
    <div class="run-row" style="cursor:default;font-weight:600;color:var(--dim);font-size:11px;border:none;background:none">
      <div>RUN ID</div><div>STATUS</div><div>ERROR</div><div>TIME</div><div>DURATION</div><div>COST</div>
    </div>`;

  for (const r of runs) {
    html += `<div class="run-row ${r.id === currentRunId ? 'active' : ''}" onclick="showRun('${esc(currentTaskId)}','${esc(r.id)}')">
      <div class="run-id">${esc(r.id.substring(0,12))}</div>
      <div class="run-status ${esc(r.status)}">${esc(r.status)}</div>
      <div class="run-error" title="${esc(r.error_message || '')}">${esc(r.error_message || '')}</div>
      <div class="run-time">${fmtTime(r.started_at || r.created_at)}</div>
      <div class="run-duration">${fmtDuration(r.duration_s)}</div>
      <div class="run-cost">${fmtCost(r.cost_usd)}</div>
    </div>`;
  }
  html += '</div>';
  el.innerHTML = html;
}

// ── Run stream ──

function renderStream(data) {
  const el = document.getElementById('content');
  const events = data.events || [];

  // Count by type
  const typeCounts = {};
  for (const ev of events) {
    typeCounts[ev.type] = (typeCounts[ev.type] || 0) + 1;
  }

  const truncNote = data.truncated ? ` <span style="color:var(--yellow)">(showing last ${data.total} of ${data.total_raw})</span>` : '';
  let html = `<a class="back-link" onclick="showTask('${esc(currentTaskId)}')">&larr; ${esc(currentTaskId)} runs</a>
    <h2 style="margin-bottom:4px">Run ${esc(currentRunId.substring(0,12))}</h2>
    <div style="color:var(--dim);font-size:11px;margin-bottom:12px">${data.total_raw || data.total} events${truncNote}</div>
    <div class="filter-bar">
      <label>Show:</label>
      ${Object.keys(filterState).map(t =>
        `<label><input type="checkbox" ${filterState[t] ? 'checked' : ''}
          onchange="filterState['${t}']=this.checked;refresh()"> ${t} (${typeCounts[t]||0})</label>`
      ).join(' ')}
      <span class="event-count">${events.filter(e => filterState[e.type]).length} visible</span>
    </div>
    <div class="stream-viewer" id="stream-viewer">`;

  for (const ev of events) {
    if (!filterState[ev.type]) continue;
    html += renderEvent(ev);
  }

  html += '</div>';
  el.innerHTML = html;

  // Auto-scroll to bottom if following
  if (streamAutoScroll) {
    const viewer = document.getElementById('stream-viewer');
    if (viewer) viewer.scrollTop = viewer.scrollHeight;
  }
}

function renderEvent(ev) {
  const ts = fmtTimeShort(ev.ts);
  const typeClass = ev.type;

  let body = '';

  if (ev.type === 'agent') {
    if (ev.thinking_only) {
      body = `<span style="color:var(--dim);font-style:italic">thinking...</span>`;
    } else {
      const parts = ev.parts || [];
      for (const p of parts) {
        if (p.kind === 'text') {
          body += `<div class="agent-text">${esc(p.text)}</div>`;
        } else if (p.kind === 'tool_call') {
          body += renderToolCall(p.tool, p.input);
        }
      }
    }

  } else if (ev.type === 'system') {
    if (ev.subtype === 'task_progress') {
      body = `<div class="progress-bar">
        <span class="tools">${ev.tool_count} tools</span>
        <span class="tokens">${fmtTokens(ev.total_tokens)} tok</span>
        <span class="dur">${fmtDuration(Math.round((ev.duration_ms||0)/1000))}</span>
        ${ev.description ? `<span style="color:var(--dim)">${esc(ev.description)}</span>` : ''}
      </div>`;
    } else if (ev.subtype === 'init') {
      const skillCount = (ev.skills||[]).length;
      const agentCount = (ev.agents||[]).length;
      const extras = [];
      if (skillCount) extras.push(`${skillCount} skills`);
      if (agentCount) extras.push(`${agentCount} agents`);
      body = `<span style="color:var(--dim)">Model: ${esc(ev.model || '?')}, ${(ev.tools||[]).length} tools${extras.length ? ', ' + extras.join(', ') : ''}</span>`;
    } else if (ev.subtype === 'task_started') {
      body = `<div style="color:var(--cyan)">▶ <b>Dispatched agent</b>${ev.description ? ': ' + esc(ev.description) : ''}</div>`;
      if (ev.prompt_preview) {
        const uid = 'p' + Math.random().toString(36).substring(2,8);
        body += `<div class="collapsible" onclick="this.classList.toggle('open')">prompt (${ev.prompt_preview.length}+ chars)</div>
          <div class="collapse-body"><div style="color:var(--dim);white-space:pre-wrap;font-size:11px;max-height:200px;overflow-y:auto">${esc(ev.prompt_preview)}</div></div>`;
      }
    } else if (ev.subtype === 'task_notification') {
      const statusColor = ev.status === 'completed' ? 'var(--green)' : ev.status === 'error' ? 'var(--red)' : 'var(--yellow)';
      body = `<div style="color:${statusColor}">◼ <b>Agent ${esc(ev.status)}</b>${ev.summary ? ': ' + esc(ev.summary) : ''}</div>
        <div class="progress-bar">
          <span class="tools">${ev.tool_count} tools</span>
          <span class="tokens">${fmtTokens(ev.total_tokens)} tok</span>
          <span class="dur">${fmtDuration(Math.round((ev.duration_ms||0)/1000))}</span>
        </div>`;
    } else if (ev.subtype === 'task_updated') {
      if (ev.task_status) {
        const statusColor = ev.task_status === 'completed' ? 'var(--green)' : ev.task_status === 'error' ? 'var(--red)' : 'var(--dim)';
        body = `<span style="color:${statusColor}">Task → ${esc(ev.task_status)}</span>`;
      } else {
        body = `<span style="color:var(--dim)">${esc(ev.raw || '')}</span>`;
      }
    } else {
      body = `<span style="color:var(--dim)">${esc(ev.raw || '')}</span>`;
    }

  } else if (ev.type === 'stdout' && ev.subtype === 'tool_result') {
    const results = ev.results || [];
    for (const r of results) {
      const preview = (r.content || '').substring(0, 300);
      const full = r.content || '';
      const isLong = full.length > 300;
      const errClass = r.is_error ? ' is-error' : '';
      if (isLong) {
        const uid = 'c' + Math.random().toString(36).substring(2,8);
        body += `<div class="collapsible" onclick="this.classList.toggle('open')">result (${full.length} chars)${r.is_error ? ' ERROR' : ''}</div>
          <div class="collapse-body"><div class="result-content${errClass}">${esc(full)}</div></div>`;
      } else {
        body += `<div class="result-content${errClass}">${esc(preview)}</div>`;
      }
    }

  } else if (ev.type === 'stdout' && ev.subtype === 'log') {
    // Daemon log line — render as plain text with level-based coloring
    const levelColor = ev.level === 'error' ? 'var(--red)' :
                       ev.level === 'warn' ? 'var(--yellow)' : 'var(--dim)';
    const fontWeight = ev.level === 'error' ? 'font-weight:600;' : '';
    body = `<span style="color:${levelColor};${fontWeight}white-space:pre-wrap">${esc(ev.text || '')}</span>`;

  } else if (ev.type === 'stdout' && ev.subtype === 'rate_limit') {
    body = `<span style="color:var(--dim)">rate_limit: ${esc(ev.rate_limit?.status || '?')}</span>`;

  } else if (ev.type === 'done') {
    let modelBreakdown = '';
    if (ev.model_usage) {
      const models = Object.entries(ev.model_usage);
      modelBreakdown = '<div style="margin-top:6px;font-size:11px;color:var(--dim)">' +
        models.map(([name, m]) => {
          const shortName = name.replace(/\[.*\]/, '');
          return `<span style="color:var(--purple)">${esc(shortName)}</span>: ` +
            `${fmtCost(m.cost)} ` +
            `<span style="color:var(--dim)">(${fmtTokens(m.input)}in + ${fmtTokens(m.output)}out` +
            (m.cache_read ? ` + ${fmtTokens(m.cache_read)}cache` : '') + ')</span>';
        }).join(' | ') + '</div>';
    }
    body = `<div class="done-box">
      <span class="cost">${fmtCost(ev.cost_usd)}</span>
      <span style="margin-left:12px">${ev.num_turns || '?'} turns</span>
      <span style="margin-left:12px">${fmtTokens(ev.total_tokens)} tokens</span>
      <span style="margin-left:12px">${fmtDuration(Math.round((ev.duration_ms||0)/1000))}</span>
      ${modelBreakdown}
      ${ev.result_text ? `<div class="result-text">${esc(ev.result_text)}</div>` : ''}
    </div>`;

  } else if (ev.type === 'error') {
    body = `<span style="color:var(--red);font-weight:600">${esc(ev.error || '')}</span>`;

  } else {
    body = `<span style="color:var(--dim)">${esc(ev.raw || ev.subtype || '')}</span>`;
  }

  return `<div class="ev">
    <span class="ev-seq">${ev.seq}</span>
    <span class="ev-ts">${ts}</span>
    <span class="ev-type ${typeClass}">${esc(ev.type)}</span>
    <div class="ev-body">${body}</div>
  </div>`;
}

function renderToolCall(name, input) {
  // Special rendering for Agent/Skill dispatches
  if (name === 'Agent' || name === 'Skill') {
    const label = name === 'Agent' ? '▶ Agent' : '⚡ Skill';
    const color = name === 'Agent' ? 'var(--cyan)' : 'var(--purple)';
    const desc = input?.description || input?.skill || input?.subagent_type || '';
    const prompt = input?.prompt || '';
    let html = `<div class="tool-call" style="border-left:3px solid ${color};padding-left:8px">`;
    html += `<span class="tool-name" style="color:${color}">${esc(label)}</span>`;
    if (desc) html += ` <span style="color:var(--text);font-weight:600">${esc(desc)}</span>`;
    if (input?.subagent_type && name === 'Agent') html += ` <span style="color:var(--dim)">[${esc(input.subagent_type)}]</span>`;
    if (prompt) {
      const preview = prompt.length > 200 ? prompt.substring(0, 200) + '...' : prompt;
      html += `<div style="color:var(--dim);font-size:11px;margin-top:2px;white-space:pre-wrap">${esc(preview)}</div>`;
    }
    if (input?.args) html += ` <span class="str">${esc(input.args)}</span>`;
    html += '</div>';
    return html;
  }

  let inputHtml = '';
  if (input && typeof input === 'object') {
    const entries = Object.entries(input);
    const parts = [];
    for (const [k, v] of entries) {
      let val;
      if (typeof v === 'string') {
        // Truncate long strings
        const display = v.length > 200 ? v.substring(0, 200) + '...' : v;
        val = `<span class="str">"${esc(display)}"</span>`;
      } else if (typeof v === 'number' || typeof v === 'boolean') {
        val = `<span class="num">${esc(String(v))}</span>`;
      } else {
        const s = JSON.stringify(v);
        const display = s.length > 100 ? s.substring(0, 100) + '...' : s;
        val = `<span class="str">${esc(display)}</span>`;
      }
      parts.push(`<span class="key">${esc(k)}</span>=${val}`);
    }
    inputHtml = parts.join(' ');
  }

  return `<div class="tool-call"><span class="tool-name">${esc(name)}</span> <span class="tool-input">${inputHtml}</span></div>`;
}

// ── Refresh loop ──

async function refresh() {
  try {
    document.getElementById('header-status').textContent = 'Updating...';

    if (currentView === 'overview') {
      const resp = await fetch('/api/status');
      const data = await resp.json();
      renderOverview(data);
    } else if (currentView === 'task' && currentTaskId) {
      const resp = await fetch(`/api/tasks/${encodeURIComponent(currentTaskId)}/runs?limit=50`);
      const runs = await resp.json();
      renderTask(runs);
    } else if (currentView === 'run' && currentRunId) {
      const resp = await fetch(`/api/runs/${encodeURIComponent(currentRunId)}/stream`);
      const data = await resp.json();
      renderStream(data);
    }

    document.getElementById('header-status').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('header-status').textContent = 'Error: ' + e.message;
    console.error('Refresh failed:', e);
  }
}

refresh();
setInterval(refresh, 10000);
</script>
