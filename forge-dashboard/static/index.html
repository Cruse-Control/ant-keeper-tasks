<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forge Dashboard</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --dim: #8b949e;
  --green: #3fb950;
  --red: #f85149;
  --yellow: #d29922;
  --blue: #58a6ff;
  --purple: #bc8cff;
  --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--mono); font-size: 13px; background: var(--bg); color: var(--text); }
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

.header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px;
}
.header h1 { font-size: 16px; font-weight: 600; }
.header .version { color: var(--dim); }
.header .status { margin-left: auto; }
.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.status-dot.running { background: var(--green); animation: pulse 2s infinite; }
.status-dot.idle { background: var(--dim); }
.status-dot.failed { background: var(--red); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

.nav { display: flex; gap: 12px; padding: 8px 24px; border-bottom: 1px solid var(--border); background: var(--surface); }
.nav button { background: none; border: 1px solid var(--border); color: var(--dim); padding: 4px 12px; border-radius: 4px; cursor: pointer; font-family: var(--mono); font-size: 12px; }
.nav button.active { color: var(--text); border-color: var(--blue); }
.nav button:hover { color: var(--text); }

.content { padding: 24px; max-width: 1200px; }

/* System overview */
.system-meta { color: var(--dim); margin-bottom: 24px; line-height: 1.8; }

/* Project cards */
.project-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 16px;
  cursor: pointer;
}
.project-card:hover { border-color: var(--blue); }
.project-card .project-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.project-card .project-name { font-size: 15px; font-weight: 600; }
.project-card .project-iter { color: var(--dim); }
.project-card .project-status { margin-left: auto; font-weight: 600; }
.project-card .project-status.passed { color: var(--green); }
.project-card .project-status.failed { color: var(--red); }
.project-card .project-status.building { color: var(--yellow); }

.gates { display: flex; gap: 24px; margin-top: 8px; }
.gate { padding: 8px 12px; background: var(--bg); border-radius: 4px; flex: 1; }
.gate .gate-label { color: var(--dim); font-size: 11px; text-transform: uppercase; margin-bottom: 4px; }
.gate .gate-result { font-weight: 600; }
.gate .gate-result.pass { color: var(--green); }
.gate .gate-result.fail { color: var(--red); }
.gate .gate-detail { color: var(--dim); font-size: 11px; margin-top: 2px; }

.agent-bar { display: flex; gap: 2px; margin-top: 12px; flex-wrap: wrap; }
.agent-pip { width: 18px; height: 18px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 9px; }
.agent-pip.success { background: #1a3a1a; color: var(--green); }
.agent-pip.failed { background: #3a1a1a; color: var(--red); }
.agent-pip.running { background: #1a2a3a; color: var(--blue); animation: pulse 1.5s infinite; }
.agent-pip.pending { background: var(--bg); color: var(--dim); }
.agent-pip[title] { cursor: help; }

/* Iteration list */
.iter-list { margin-top: 16px; }
.iter-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 16px;
  margin-bottom: 8px;
}
.iter-row.current { border-left: 3px solid var(--blue); }
.iter-header { display: flex; align-items: center; gap: 12px; cursor: pointer; }
.iter-num { font-weight: 700; color: var(--blue); width: 30px; }
.iter-gates { display: flex; gap: 8px; flex: 1; }
.iter-badge { padding: 2px 8px; border-radius: 3px; font-size: 11px; }
.iter-badge.pass { background: #1a3a1a; color: var(--green); }
.iter-badge.fail { background: #3a1a1a; color: var(--red); }
.iter-badge.na { background: var(--bg); color: var(--dim); }
.iter-duration { color: var(--dim); font-size: 11px; }
.iter-detail { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.iter-row.expanded .iter-detail { display: block; }

.agents-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
.agents-table th { text-align: left; color: var(--dim); font-weight: normal; padding: 4px 8px; border-bottom: 1px solid var(--border); }
.agents-table td { padding: 4px 8px; }
.agents-table .tier-label { color: var(--purple); font-weight: 600; }

.constraints-list { margin-top: 12px; }
.constraint { color: var(--yellow); font-size: 11px; padding: 2px 0; word-break: break-all; }

/* Log viewer */
.log-viewer {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
  font-size: 12px;
  line-height: 1.6;
  max-height: 600px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-all;
}

/* Enhancement view */
.enhancement-content {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px 20px;
  line-height: 1.8;
}

.elapsed { color: var(--dim); font-size: 11px; }
.back-link { margin-bottom: 16px; display: inline-block; font-size: 12px; }
</style>
</head>
<body>

<div class="header">
  <h1>Forge</h1>
  <span class="version" id="version"></span>
  <div class="status" id="status-indicator"></div>
</div>

<div class="nav">
  <button class="active" onclick="showView('overview')">Overview</button>
  <button onclick="showView('log')">Coordinator Log</button>
  <button onclick="showView('enhancements')">Enhancements</button>
</div>

<div class="content" id="content"></div>

<script>
let currentView = 'overview';
let currentProject = null;
let statusData = null;
let expandedIters = new Set();

function showView(view, projectId) {
  currentView = view;
  currentProject = projectId || null;
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  if (view === 'overview' || view === 'project') document.querySelectorAll('.nav button')[0].classList.add('active');
  if (view === 'log') document.querySelectorAll('.nav button')[1].classList.add('active');
  if (view === 'enhancements') document.querySelectorAll('.nav button')[2].classList.add('active');
  refresh();
}

function formatDuration(secs) {
  if (!secs) return '--';
  if (secs < 60) return `${secs}s`;
  if (secs < 3600) return `${Math.floor(secs/60)}m ${secs%60}s`;
  return `${Math.floor(secs/3600)}h ${Math.floor((secs%3600)/60)}m`;
}

function formatTime(iso) {
  if (!iso) return '--';
  try { return new Date(iso).toLocaleString(); } catch { return iso; }
}

function agentInitial(name) {
  const map = {
    'types-agent':'Ty', 'config-agent':'Cf', 'infra-agent':'If',
    'redis-utils-agent':'Rd', 'resolvers-agent':'Rs', 'graphiti-agent':'Gr',
    'frontier-agent':'Fr', 'ingestion-agent':'Ig', 'alerts-agent':'Al',
    'health-agent':'He', 'worker-agent':'Wk', 'integration-test-agent':'It',
    'docs-agent':'Dc',
  };
  return map[name] || name.substring(0,2);
}

// --- Overview ---
function renderOverview(data) {
  const el = document.getElementById('content');
  const running = data.coordinator_running;

  document.getElementById('version').textContent = `v${data.forge_version}`;
  document.getElementById('status-indicator').innerHTML = `
    <span class="status-dot ${running ? 'running' : 'idle'}"></span>
    ${running ? 'Running' : 'Idle'}
  `;

  let html = `<div class="system-meta">
    Enhancement loop: ${data.last_enhancement_run ? `last ran ${formatTime(data.last_enhancement_run)}` : 'never ran'}<br>
    Enhancements applied: ${data.enhancement_count}
  </div>`;

  if (!data.projects.length) {
    html += '<div style="color:var(--dim)">No projects registered</div>';
  }

  for (const p of data.projects) {
    const statusClass = p.status === 'passed' ? 'passed' : p.status === 'failed' ? 'failed' : 'building';
    html += `<div class="project-card" onclick="showView('project','${p.id}')">
      <div class="project-header">
        <span class="project-name">${p.id}</span>
        <span class="project-iter">iter ${p.current_iteration}/${p.max_iterations}</span>
        ${p.current_agent ? `<span class="elapsed">agent: ${p.current_agent}</span>` : ''}
        ${p.started_at ? `<span class="elapsed">${formatDuration(p.elapsed_seconds)}</span>` : ''}
        <span class="project-status ${statusClass}">${p.status.toUpperCase()}</span>
      </div>
      <div class="gates">
        <div class="gate">
          <div class="gate-label">Gate 1 — Unit Tests</div>
          ${p.gate1 ? `
            <div class="gate-result ${p.gate1.passed ? 'pass' : 'fail'}">${p.gate1.passed ? 'PASS' : 'FAIL'}</div>
            <div class="gate-detail">${p.gate1.tests_passed}p / ${p.gate1.tests_failed}f</div>
          ` : '<div class="gate-result" style="color:var(--dim)">--</div>'}
        </div>
        <div class="gate">
          <div class="gate-label">Gate 2 — Production</div>
          ${p.gate2 ? `
            <div class="gate-result ${p.gate2.passed ? 'pass' : 'fail'}">${p.gate2.passed ? 'PASS' : 'FAIL'}</div>
            <div class="gate-detail">deploy:${p.gate2.deploy} int:${p.gate2.integration} e2e:${p.gate2.e2e} sec:${p.gate2.security}</div>
          ` : '<div class="gate-result" style="color:var(--dim)">--</div>'}
        </div>
      </div>
    </div>`;
  }
  el.innerHTML = html;
}

// --- Project detail ---
async function renderProject(projectId) {
  const el = document.getElementById('content');
  // Only show loading on first render, not on refresh
  if (!el.querySelector('.iter-list')) {
    el.innerHTML = '<div style="color:var(--dim)">Loading...</div>';
  }

  const resp = await fetch(`/api/projects/${projectId}`);
  if (!resp.ok) { el.innerHTML = `<div>Error: ${resp.status}</div>`; return; }
  const data = await resp.json();

  let html = `<a class="back-link" href="#" onclick="showView('overview');return false">&larr; All projects</a>
  <h2 style="margin-bottom:4px">${data.id}</h2>
  <div class="system-meta">
    ${data.repo} @ ${data.branch}<br>
    Forge version: ${data.forge_version}<br>
    Status: <strong style="color:${data.status === 'passed' ? 'var(--green)' : data.status === 'failed' ? 'var(--red)' : 'var(--yellow)'}">${data.status}</strong><br>
    Started: ${formatTime(data.started_at)}
  </div>
  <div class="iter-list">`;

  for (const it of data.iterations) {
    const isCurrent = it.iteration === data.iterations.length && data.status === 'in_progress';
    const g1 = it.gate1_passed;
    const g2 = it.gate2;
    const agents = it.agents || [];
    const constraints = it.constraints || [];

    // Duration
    let dur = '--';
    if (it.started_at && it.finished_at) {
      const d = (new Date(it.finished_at) - new Date(it.started_at)) / 1000;
      dur = formatDuration(Math.round(d));
    }

    html += `<div class="iter-row ${isCurrent ? 'current' : ''} ${expandedIters.has(it.iteration) ? 'expanded' : ''}" onclick="toggleIter(${it.iteration}, this)">
      <div class="iter-header">
        <span class="iter-num">#${it.iteration}</span>
        <div class="iter-gates">
          <span class="iter-badge ${g1 ? 'pass' : 'fail'}">G1: ${g1 ? 'PASS' : 'FAIL'} ${it.tests.passed || 0}p/${it.tests.failed || 0}f</span>
          ${g2 ? `<span class="iter-badge ${g2.passed ? 'pass' : 'fail'}">G2: ${g2.passed ? 'PASS' : 'FAIL'}</span>` : '<span class="iter-badge na">G2: --</span>'}
        </div>
        <span class="iter-duration">${dur}</span>
        ${constraints.length ? `<span style="color:var(--yellow);font-size:11px">${constraints.length} constraints</span>` : ''}
      </div>
      <div class="iter-detail">
        <strong>Agents</strong>
        <table class="agents-table">
          <tr><th>Agent</th><th>Tier</th><th>Status</th><th>Duration</th><th>Log</th></tr>
          ${agents.map(a => `<tr>
            <td>${a.name}</td>
            <td style="color:var(--purple)">${a.tier !== undefined ? a.tier : '--'}</td>
            <td style="color:${a.status === 'success' ? 'var(--green)' : a.status === 'failed' ? 'var(--red)' : 'var(--dim)'}">${a.status}</td>
            <td>${formatDuration(Math.round(a.duration_s || 0))}</td>
            <td><a href="#" onclick="event.stopPropagation();showAgentLog('${projectId}','${a.name}');return false">view</a></td>
          </tr>`).join('')}
        </table>
        ${g2 ? `<div style="margin-top:12px">
          <strong>Gate 2 — Production</strong><br>
          <span style="color:var(--dim);font-size:12px">
            Deploy: ${g2.deploy?.success ? '<span style="color:var(--green)">OK</span>' : '<span style="color:var(--red)">FAIL</span>'}
            ${g2.deploy?.error ? ` — ${g2.deploy.error}` : ''}<br>
            Integration: ${g2.integration?.passed || 0}p / ${g2.integration?.failed || 0}f<br>
            E2E: ${g2.e2e?.passed || 0}p / ${g2.e2e?.failed || 0}f<br>
            Security: ${g2.security?.passed || 0}p / ${g2.security?.failed || 0}f
          </span>
        </div>` : ''}
        ${constraints.length ? `<div class="constraints-list">
          <strong>Constraints</strong>
          ${constraints.map(c => `<div class="constraint">&rarr; ${escHtml(c)}</div>`).join('')}
        </div>` : ''}
      </div>
    </div>`;
  }

  // Show in-progress iteration that hasn't been saved to BUILD-STATE yet
  if (data.in_progress_iteration) {
    html += `<div class="iter-row current">
      <div class="iter-header">
        <span class="iter-num">#${data.in_progress_iteration}</span>
        <div class="iter-gates">
          <span class="iter-badge na" style="background:#1a2a3a;color:var(--blue)">RUNNING</span>
        </div>
        <span class="iter-duration" style="color:var(--blue)">agents dispatching...</span>
      </div>
    </div>`;
  }

  html += '</div>';
  el.innerHTML = html;
}

// --- Agent log ---
async function showAgentLog(projectId, agentName) {
  const el = document.getElementById('content');
  el.innerHTML = '<div style="color:var(--dim)">Loading log...</div>';
  currentView = 'agent-log';

  const resp = await fetch(`/api/projects/${projectId}/agents/${agentName}/log`);
  const data = await resp.json();

  el.innerHTML = `<a class="back-link" href="#" onclick="showView('project','${projectId}');return false">&larr; ${projectId}</a>
    <h2 style="margin-bottom:12px">${agentName}</h2>
    <div class="log-viewer">${escHtml(data.log || data.error || 'No log')}</div>`;
}

// --- Coordinator log ---
async function renderLog() {
  const el = document.getElementById('content');
  const resp = await fetch('/api/coordinator/log?tail=300');
  const data = await resp.json();
  el.innerHTML = `<h2 style="margin-bottom:12px">Coordinator Log</h2>
    <div class="log-viewer">${escHtml(data.lines.join('\n'))}</div>`;
}

// --- Enhancements ---
async function renderEnhancements() {
  const el = document.getElementById('content');
  const resp = await fetch('/api/enhancements');
  const data = await resp.json();
  el.innerHTML = `<h2 style="margin-bottom:12px">System Enhancements</h2>
    <div class="enhancement-content">${escHtml(data.content)}</div>`;
}

function toggleIter(iteration, el) {
  el.classList.toggle('expanded');
  if (expandedIters.has(iteration)) expandedIters.delete(iteration);
  else expandedIters.add(iteration);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// --- Refresh loop ---
async function refresh() {
  try {
    if (currentView === 'overview') {
      const resp = await fetch('/api/status');
      statusData = await resp.json();
      renderOverview(statusData);
    } else if (currentView === 'project' && currentProject) {
      await renderProject(currentProject);
    } else if (currentView === 'log') {
      await renderLog();
    } else if (currentView === 'enhancements') {
      await renderEnhancements();
    }
  } catch (e) {
    console.error('Refresh failed:', e);
  }
}

// Poll every 5 seconds
refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
